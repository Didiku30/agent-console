async function callClaude(systemPrompt, messages) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error("NO_KEY");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-allow-browser":"true"},
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:2000, system:systemPrompt, messages })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || data.error.type || "API error");
  return data.content?.[0]?.text || "Nu am putut genera un răspuns.";
}

function ThinkingDots() {
  return (
    <span style={{display:"inline-flex",gap:3,alignItems:"center"}}>
      {[0,1,2].map(i=><span key={i} style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:"var(--color-text-tertiary)",animation:`tdot 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}
      <style>{`@keyframes tdot{0%,80%,100%{transform:scale(0.5);opacity:0.4}40%{transform:scale(1);opacity:1}}`}</style>
    </span>
  );
}

function renderMd(text) {
  if (!text) return null;
  return text.split('\n').map((line, li, arr) => {
    const parts = []; let rem = line; let k = 0;
    while (rem.length > 0) {
      const cm = rem.match(/^(.*?)`([^`]+)`(.*)/s);
      const bm = rem.match(/^(.*?)\*\*([^*]+)\*\*(.*)/s);
      if (cm && (!bm || cm[1].length <= bm[1].length)) {
        if (cm[1]) parts.push(<span key={k++}>{cm[1]}</span>);
        parts.push(<code key={k++} style={{fontSize:12,padding:"1px 5px",borderRadius:4,background:"var(--color-background-secondary)",border:"0.5px solid var(--color-border-tertiary)",fontFamily:"var(--font-mono)"}}>{cm[2]}</code>);
        rem = cm[3];
      } else if (bm) {
        if (bm[1]) parts.push(<span key={k++}>{bm[1]}</span>);
        parts.push(<strong key={k++} style={{fontWeight:600}}>{bm[2]}</strong>);
        rem = bm[3];
      } else { parts.push(<span key={k++}>{rem}</span>); rem=''; }
    }
    return <span key={li}>{parts}{li<arr.length-1?<br/>:null}</span>;
  });
}

      </div>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{fontSize:11,color:"var(--color-text-secondary)",fontWeight:500,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Anthropic API Key</div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input type={show?"text":"password"} value={key} onChange={e=>setKey(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()}
            placeholder="sk-ant-api03-..."
            style={{flex:1,padding:"10px 14px",borderRadius:10,fontSize:13,border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-secondary)",color:"var(--color-text-primary)",outline:"none",fontFamily:"var(--font-mono)"}}/>
          <button onClick={()=>setShow(s=>!s)} style={{padding:"10px 12px",borderRadius:10,border:"0.5px solid var(--color-border-secondary)",background:"none",cursor:"pointer",fontSize:12,color:"var(--color-text-secondary)"}}>{show?"🙈":"👁"}</button>
        </div>
        {err && <div style={{fontSize:13,color:"#A32D2D",marginBottom:10,padding:"8px 12px",borderRadius:8,background:"#FCEBEB"}}>{err}</div>}
        <button onClick={save} disabled={!valid||testing}
          style={{width:"100%",padding:11,borderRadius:10,border:"none",background:valid&&!testing?"var(--color-text-primary)":"var(--color-border-tertiary)",color:valid&&!testing?"var(--color-background-primary)":"var(--color-text-tertiary)",cursor:valid&&!testing?"pointer":"default",fontSize:14,fontWeight:500}}>
          {testing?"Se verifică…":"Continuă →"}
        </button>
        <div style={{marginTop:14,fontSize:12,color:"var(--color-text-tertiary)",textAlign:"center",lineHeight:1.7}}>
          Key-ul se stochează doar pe acest dispozitiv.<br/>
          <a href="https://console.anthropic.com/keys" target="_blank" style={{color:"var(--color-text-secondary)"}}>console.anthropic.com/keys</a>
        </div>
      </div>
    </div>
  );
}

function App({ onLogout }) {
  const [agents, setAgents] = useState(()=>loadAgents()||DEFAULT_AGENTS);
  const [activeId, setActiveId] = useState(null);
  const [modal, setModal] = useState(null);
  const [search, setSearch] = useState("");
  const [collapsed, setCollapsed] = useState(false);
  const [tab, setTab] = useState("agents");

  useEffect(()=>{saveAgents(agents);},[agents]);

  const activeAgent = agents.find(a=>a.id===activeId)||null;
  const filtered = agents.filter(a=>
    a.name.toLowerCase().includes(search.toLowerCase())||
    (a.description||"").toLowerCase().includes(search.toLowerCase())||
    (a.skills||[]).some(s=>s.toLowerCase().includes(search.toLowerCase()))
  );
  const updateHistory = useCallback((id,history)=>{ setAgents(prev=>prev.map(a=>a.id===id?{...a,history}:a)); },[]);
  const deleteAgent = (id) => { if(!confirm("Ștergi agentul?"))return; setAgents(p=>p.filter(a=>a.id!==id)); if(activeId===id)setActiveId(null); };
  const saveAgent = (agent) => { setAgents(p=>{ const e=p.find(a=>a.id===agent.id); return e?p.map(a=>a.id===agent.id?{...a,...agent}:a):[...p,agent]; }); setModal(null); };
  const totalMsgs = agents.reduce((s,a)=>s+(a.history?.filter(m=>m.role==="user").length||0),0);

  return (
    <div style={{display:"flex",height:"100vh",fontFamily:"var(--font-sans)",background:"var(--color-background-primary)"}}>
      <div style={{width:collapsed?52:256,flexShrink:0,display:"flex",flexDirection:"column",borderRight:"0.5px solid var(--color-border-tertiary)",background:"var(--color-background-tertiary)",overflow:"hidden",transition:"width 0.22s cubic-bezier(0.4,0,0.2,1)",boxShadow:"2px 0 12px rgba(0,0,0,0.08)"}}>
        <div style={{padding:collapsed?"12px 0 8px":"12px 12px 8px",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:collapsed?"center":"space-between",marginBottom:10}}>
            {!collapsed && <div style={{display:"flex",alignItems:"center",gap:8}}><img src={LOGO_SRC} alt="DD" style={{width:24,height:24,objectFit:"contain"}}/><span style={{fontSize:14,fontWeight:500}}>Console</span></div>}
            <button onClick={()=>setCollapsed(c=>!c)} style={{background:"none",border:"none",cursor:"pointer",padding:"5px 6px",borderRadius:6,color:"var(--color-text-secondary)",display:"flex"}}
              onMouseEnter={e=>e.currentTarget.style.background="var(--color-background-secondary)"}
              onMouseLeave={e=>e.currentTarget.style.background="none"}>
              <CollapseIcon flipped={collapsed}/>
            </button>
          </div>
          {!collapsed ? (
            <>
              <div style={{display:"flex",borderRadius:8,background:"var(--color-background-secondary)",padding:3,gap:2,marginBottom:10}}>
                {[{k:"agents",l:"Agenți"},{k:"chat",l:"Chat liber"}].map(t=>(
                  <button key={t.k} onClick={()=>setTab(t.k)}
                    style={{flex:1,padding:"5px 8px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:tab===t.k?500:400,background:tab===t.k?"var(--color-background-primary)":"transparent",color:tab===t.k?"var(--color-text-primary)":"var(--color-text-secondary)",boxShadow:tab===t.k?"0 0.5px 3px rgba(0,0,0,0.1)":"none",transition:"all 0.15s"}}>{t.l}</button>
                ))}
              </div>
              {tab==="agents" && <button onClick={()=>setModal({type:"new"})}
                style={{width:"100%",display:"flex",alignItems:"center",gap:7,padding:"7px 10px",borderRadius:8,border:"0.5px solid var(--color-border-secondary)",background:"none",cursor:"pointer",fontSize:13,color:"var(--color-text-secondary)"}}
                onMouseEnter={e=>e.currentTarget.style.background="var(--color-background-secondary)"}
                onMouseLeave={e=>e.currentTarget.style.background="none"}>
                <PlusIcon/> Agent nou
              </button>}
            </>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
              {[{k:"agents",l:"A"},{k:"chat",l:"C"}].map(t=>(
                <button key={t.k} onClick={()=>{setTab(t.k);setCollapsed(false);}} title={t.k==="agents"?"Agenți":"Chat liber"}
                  style={{background:tab===t.k?"var(--color-background-secondary)":"none",border:"0.5px solid var(--color-border-secondary)",borderRadius:8,width:32,height:26,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"var(--color-text-secondary)",fontSize:11,fontWeight:500}}>{t.l}</button>
              ))}
            </div>
          )}
        </div>
        {!collapsed && tab==="agents" && (
          <div style={{padding:"0 12px 8px",flexShrink:0}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Caută…"
              style={{width:"100%",padding:"7px 10px",borderRadius:8,fontSize:12,border:"0.5px solid var(--color-border-secondary)",boxSizing:"border-box",background:"var(--color-background-secondary)",color:"var(--color-text-primary)",outline:"none"}}/>
          </div>
        )}
        <div style={{flex:1,overflowY:"auto",padding:"0 6px 12px"}}>
          {tab==="agents" && filtered.map(a=>(
            <SidebarItem key={a.id} agent={a} isActive={activeId===a.id}
              onClick={()=>setActiveId(a.id)}
              onEdit={ag=>setModal({type:"edit",agent:ag})}
              onDelete={deleteAgent} collapsed={collapsed}/>
          ))}
          {tab==="chat" && !collapsed && <div style={{padding:"12px 8px 0",fontSize:12,color:"var(--color-text-secondary)",lineHeight:1.6}}>Chat direct cu Claude, fără restricții.</div>}
        </div>
        {!collapsed && (
          <div style={{padding:"10px 14px",borderTop:"0.5px solid var(--color-border-tertiary)",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
            {tab==="agents" && <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{agents.length} agenți · {totalMsgs} mesaje</span>}
            <button onClick={()=>{if(confirm("Schimbi API key-ul?"))onLogout();}} style={{background:"none",border:"none",fontSize:11,color:"var(--color-text-tertiary)",cursor:"pointer",marginLeft:"auto"}}>⚙ Key</button>
          </div>
        )}
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden"}}>
        {tab==="chat" ? <FreeChatPanel key="free"/>
        : activeAgent ? (
          <ChatPanel key={activeAgent.id} agent={agents.find(a=>a.id===activeAgent.id)||activeAgent}
            onUpdateHistory={h=>updateHistory(activeAgent.id,h)} onClose={()=>setActiveId(null)}/>
        ) : (
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:48,textAlign:"center"}}>
            <img src={LOGO_SRC} alt="DD" style={{width:70,height:70,objectFit:"contain",opacity:0.85}}/>
            <div style={{marginTop:18,fontSize:20,fontWeight:500}}>Agent Console</div>
            <div style={{marginTop:8,fontSize:14,color:"var(--color-text-secondary)",maxWidth:360,lineHeight:1.75}}>Selectează un agent sau folosește Chat liber pentru a vorbi direct cu Claude.</div>
            <div style={{display:"flex",gap:8,marginTop:22}}>
              <button onClick={()=>setModal({type:"new"})} style={{padding:"9px 18px",borderRadius:8,border:"0.5px solid var(--color-border-secondary)",background:"none",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:7}}><PlusIcon/> Agent nou</button>
              <button onClick={()=>setTab("chat")} style={{padding:"9px 18px",borderRadius:8,border:"none",background:"var(--color-text-primary)",cursor:"pointer",fontSize:13,color:"var(--color-background-primary)"}}>Chat liber →</button>
            </div>
          </div>
        )}
      </div>
      {modal && <AgentModal agent={modal.type==="edit"?modal.agent:null} onSave={saveAgent} onClose={()=>setModal(null)}/>}
    </div>
  );
}

function Root() {
  const [hasKey, setHasKey] = useState(()=>!!localStorage.getItem(API_KEY_STORAGE));
  if (!hasKey) return <ApiKeyScreen onSave={()=>setHasKey(true)}/>;
  return <App onLogout={()=>{localStorage.removeItem(API_KEY_STORAGE);setHasKey(false);}}/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root/>);
</script>
</body>
</html>
